<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Demo A</title>
<style>
  :root {
    --demo-bg: #0a0a23;
    --demo-accent: #FFCC00;
    --demo-text: #ffffff;
    --demo-title-size: 120px;
    --demo-padding: 80px;
    --demo-align: flex-start;
    --demo-text-align: left;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }
  .stage {
    width: 100%; height: 100%;
    background: var(--demo-bg);
    color: var(--demo-text);
    padding: var(--demo-padding);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: var(--demo-align);
    text-align: var(--demo-text-align);
  }
  .eyebrow {
    font-size: 18px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--demo-accent);
    margin-bottom: 32px;
  }
  .title {
    font-size: var(--demo-title-size);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 32px;
    max-width: 1500px;
  }
  .subtitle {
    font-size: 28px;
    line-height: 1.4;
    color: var(--demo-text);
    opacity: 0.7;
    max-width: 900px;
  }
  .accent-bar {
    margin-top: 48px;
    width: 120px;
    height: 6px;
    background: var(--demo-accent);
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="eyebrow">Demo · 2026</div>
    <h1 class="title">Tweak the colors and watch this update live.</h1>
    <p class="subtitle">Drop a pin on the title. Drag a quadrant over the subtitle. Export the prompt.</p>
    <div class="accent-bar"></div>
  </div>
</body>
</html>
