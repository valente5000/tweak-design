<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Demo B</title>
<style>
  :root {
    --demo-bg: #0a0a23;
    --demo-accent: #FFCC00;
    --demo-text: #ffffff;
    --demo-title-size: 120px;
    --demo-padding: 80px;
    --demo-align: flex-start;
    --demo-text-align: left;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }
  .stage {
    width: 100%; height: 100%;
    background: var(--demo-bg);
    color: var(--demo-text);
    padding: var(--demo-padding);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: var(--demo-align);
    text-align: var(--demo-text-align);
  }
  .label {
    font-size: 22px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 32px;
  }
  .number {
    font-size: 360px;
    font-weight: 800;
    line-height: 0.85;
    letter-spacing: -0.05em;
    color: var(--demo-accent);
    font-variant-numeric: tabular-nums;
  }
  .number sup { font-size: 0.4em; vertical-align: super; }
  .caption {
    font-size: 24px;
    line-height: 1.4;
    margin-top: 32px;
    opacity: 0.75;
    max-width: 800px;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="label">Result · Q2 2026</div>
    <div class="number">+34<sup>%</sup></div>
    <p class="caption">Improvement on the metric you've been chasing for a quarter.</p>
  </div>
</body>
</html>
