<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tweak-design</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./playground.css">
</head>
<body>
<header class="topbar">
  <div class="topbar__brand">
    <span class="brand__dot"></span>
    <span class="brand__name">tweak-design</span>
    <span class="brand__sep">/</span>
    <span class="brand__title" id="projectTitle">loading…</span>
  </div>

  <nav class="topbar__nav" id="layoutNav"></nav>

  <div class="topbar__actions">
    <button class="action-btn" id="inspectBtn" title="Inspect element (i)">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="7.5" cy="7.5" r="4.5"/>
        <line x1="11" y1="11" x2="14" y2="14"/>
      </svg>
      <span>Inspect</span>
    </button>
    <div class="topbar__modes">
      <button class="mode-btn is-active" data-mode="1" title="Single (1)">
        <svg viewBox="0 0 16 16" width="16" height="16"><rect x="2" y="3" width="12" height="10" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
      </button>
      <button class="mode-btn" data-mode="2" title="2-up split (2)">
        <svg viewBox="0 0 16 16" width="16" height="16"><rect x="2" y="3" width="5.5" height="10" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.4"/><rect x="8.5" y="3" width="5.5" height="10" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
      </button>
      <button class="mode-btn" data-mode="3" title="3-up split (3)">
        <svg viewBox="0 0 16 16" width="16" height="16"><rect x="2" y="3" width="3.5" height="10" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.4"/><rect x="6.25" y="3" width="3.5" height="10" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.4"/><rect x="10.5" y="3" width="3.5" height="10" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
      </button>
    </div>
  </div>
</header>

<main class="canvas" id="canvas"></main>

<aside class="sidebar">
  <section class="sidebar__section sidebar__section--scroll" id="elementPanelSection" hidden>
    <header class="section__head">
      <h2 class="section__title">Selected element</h2>
      <button class="section__close" id="elementPanelClose" title="deselect">×</button>
    </header>
    <div id="elementPanelBody" class="element-panel"></div>
  </section>

  <section class="sidebar__section sidebar__section--scroll" id="tweaksSection">
    <header class="section__head">
      <h2 class="section__title">Design tweaks</h2>
      <span class="section__hint" id="scopeHint">📍 this layout</span>
    </header>
    <div id="tweaksContainer" class="tweaks"></div>
  </section>

  <section class="sidebar__section sidebar__section--scroll">
    <header class="section__head">
      <h2 class="section__title">Annotations <span class="annotation-count" id="annotationCount">0</span></h2>
      <span class="section__hint">click pin · drag rect</span>
    </header>
    <div id="annotationsContainer" class="annotations"></div>
  </section>

  <footer class="sidebar__footer">
    <button class="btn btn--ghost" id="saveJsonBtn" title="Save session.json">Save .json</button>
    <button class="btn btn--accent" id="exportBtn" title="Export prompt (e)">Export prompt</button>
    <button class="btn btn--danger-ghost" id="resetBtn" title="Reset all">Reset</button>
  </footer>
</aside>

<div class="modal-backdrop" id="exportModal" hidden>
  <div class="modal">
    <div class="modal__head">
      <h3>Export prompt</h3>
      <button class="modal__close" id="modalClose" aria-label="close">×</button>
    </div>
    <p class="modal__hint" id="modalHint">Copied to your clipboard. Paste into your Claude conversation.</p>
    <pre class="modal__pre" id="exportPre"></pre>
    <div class="modal__foot">
      <button class="btn btn--accent" id="copyAgainBtn">Copy again</button>
    </div>
  </div>
</div>

<script src="./playground.js"></script>
</body>
</html>
